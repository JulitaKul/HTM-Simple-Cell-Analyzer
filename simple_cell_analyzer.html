<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HTM Simple Cell Analyzer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 13px;
    color: #222;
    background: #f5f5f5;
    padding: 14px;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 14px;
  }
  .panel {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 12px;
  }
  .control {
    margin-bottom: 12px;
  }
  .control label {
    display: block;
    font-size: 12px;
    color: #555;
    margin-bottom: 4px;
  }
  .control .val {
    float: right;
    font-family: monospace;
    color: #2c7;
  }
  input[type=range] {
    width: 100%;
  }
  .checks label {
    display: block;
    font-size: 12px;
    margin-bottom: 4px;
    cursor: pointer;
  }
  button {
    display: block;
    width: 100%;
    padding: 7px;
    margin-top: 6px;
    border: 1px solid #ccc;
    background: #fff;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  button.primary {
    background: #2c7;
    color: #fff;
    border-color: #2c7;
    font-weight: 500;
  }
  button:hover:not(:disabled) { filter: brightness(0.95); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .canvas-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .canvas-box {
    background: #222;
    border-radius: 4px;
    padding: 6px;
    text-align: center;
  }
  .canvas-box h3 {
    font-size: 11px;
    color: #aaa;
    margin-bottom: 4px;
    font-weight: 400;
  }
  canvas {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
    background: #000;
  }
  .results {
    margin-top: 10px;
  }
  .results table {
    width: 100%;
    font-size: 12px;
    border-collapse: collapse;
  }
  .results td {
    padding: 4px 8px;
    border-bottom: 1px solid #eee;
  }
  .results td:first-child {
    color: #666;
    width: 50%;
  }
  .results td:last-child {
    font-family: monospace;
    text-align: right;
  }
  .verdict {
    padding: 6px 10px;
    border-radius: 4px;
    margin-top: 8px;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
  }
  .v-ok { background: #e1f5ec; color: #175; }
  .v-mid { background: #fdf0d5; color: #854; }
  .v-bad { background: #fce4e4; color: #833; }
  .status {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
    min-height: 14px;
  }
  .section-title {
    font-size: 10px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  input[type=file] {
    font-size: 11px;
  }
  .logo-bar {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-bar img {
    max-width: 100%;
    height: auto;
    display: block;
  }
  .funding-note {
    margin-top: 12px;
    padding: 10px 14px;
    background: #f5f5f5;
    border-left: 3px solid #ccc;
    border-radius: 4px;
    font-size: 11px;
    color: #555;
    line-height: 1.5;
  }
</style>
</head>

<h1>HTM Simple Cell Analyzer <span style="font-size:11px;color:#888;font-weight:400">— minimal browser tool</span></h1>

<div class="layout">

  <!-- Sidebar -->
  <div class="panel">
    <div class="control">
      <div class="section-title">Image</div>
      <input type="file" id="file" accept=".png,.jpg,.jpeg">
      <div class="status" id="fstat"></div>
    </div>

    <div class="section-title">Parameters</div>

    <!-- TUNABLE: threshold multiplier for cell mask (0 = mean only) -->
    <div class="control">
      <label>Threshold <span class="val" id="thrV">0.80</span></label>
      <input type="range" id="thr" min="0.30" max="0.98" step="0.01" value="0.80">
      <div style="font-size:10px;color:#888;margin-top:2px">Higher = only brightest pixels kept as cell</div>
    </div>

    <!-- TUNABLE: blur radius for background subtraction (higher = stronger BG removal) -->
    <div class="control">
      <label>Background blur <span class="val" id="blurV">8</span></label>
      <input type="range" id="blur" min="0" max="30" step="1" value="8">
    </div>

    <!-- TUNABLE: granule sensitivity — offset above masked mean -->
    <div class="control">
      <label>Granule sensitivity <span class="val" id="granV">0.25</span></label>
      <input type="range" id="gran" min="0.05" max="0.80" step="0.01" value="0.25">
    </div>

    <div class="section-title">Display</div>
    <div class="checks">
      <label><input type="checkbox" id="showMask" checked> Show binary mask</label>
      <label><input type="checkbox" id="showContour" checked> Show contour</label>
      <label><input type="checkbox" id="showGranules" checked> Show granules</label>
    </div>

    <button class="primary" id="runBtn" disabled>Run Analysis</button>
    <button id="expCsv" disabled>Export Results CSV</button>

    <div class="status" id="pstat"></div>

    <div class="funding-note">
      This research was funded by the Medical Research Agency, grant no.
      2024/ABM/03/KPO/KPOD.07.07-IW.07-0072/24-00.
    </div>
  </div>

  <!-- Main display -->
  <div>
    <div class="canvas-row">
      <div class="canvas-box">
        <h3>ORIGINAL</h3>
        <canvas id="cvOrig" width="400" height="300"></canvas>
      </div>
      <div class="canvas-box">
        <h3>OVERLAY</h3>
        <canvas id="cvOver" width="400" height="300"></canvas>
      </div>
    </div>

    <div class="panel results" id="resPanel" style="display:none;margin-top:14px">
      <div class="section-title">Results</div>
      <table>
        <tbody id="resBody"></tbody>
      </table>
      <div id="verdict" class="verdict"></div>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
const S = { imgData: null, w: 0, h: 0, fileName: '', results: null };

// ─── UI wiring ──────────────────────────────────────────────────────────────
function bindSlider(id, disp, fmt) {
  const el = document.getElementById(id);
  const d = document.getElementById(disp);
  el.addEventListener('input', () => d.textContent = fmt(+el.value));
}
bindSlider('thr', 'thrV', v => v.toFixed(2));
// Default percentile cutoff for dim holotomographic cells

// Live preview: re-run when threshold slider settles (200ms debounce)
let thrTimer = null;
document.getElementById('thr').addEventListener('input', () => {
  if (!S.imgData) return;
  if (thrTimer) clearTimeout(thrTimer);
  thrTimer = setTimeout(() => runAnalysis(), 250);
});
bindSlider('blur', 'blurV', v => v | 0);
bindSlider('gran', 'granV', v => v.toFixed(2));

document.getElementById('file').addEventListener('change', onFile);
document.getElementById('runBtn').addEventListener('click', runAnalysis);
document.getElementById('expCsv').addEventListener('click', exportCsv);

// Draw placeholder text so canvases are not blank
function drawPlaceholder() {
  ['cvOrig', 'cvOver'].forEach(id => {
    const c = document.getElementById(id);
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, c.width, c.height);
    ctx.fillStyle = '#666';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Upload an image to begin', c.width / 2, c.height / 2);
  });
}
drawPlaceholder();

// Re-render when display checkboxes toggle (cheap: only redraws overlay)
['showMask', 'showContour', 'showGranules'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    if (S.results) drawOverlay();
  });
});

// ─── Load image ─────────────────────────────────────────────────────────────
function onFile(e) {
  const f = e.target.files[0];
  if (!f) return;
  S.fileName = f.name;
  document.getElementById('fstat').textContent = 'Loading ' + f.name + '...';

  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      // Downscale for speed. TUNABLE: MAX_DIM.
      const MAX_DIM = 500;
      let w = img.width, h = img.height;
      if (w > MAX_DIM || h > MAX_DIM) {
        const s = MAX_DIM / Math.max(w, h);
        w = Math.round(w * s);
        h = Math.round(h * s);
      }
      const oc = document.createElement('canvas');
      oc.width = w; oc.height = h;
      const octx = oc.getContext('2d');
      octx.drawImage(img, 0, 0, w, h);
      S.imgData = octx.getImageData(0, 0, w, h);
      S.w = w; S.h = h;

      // Display original
      const cv = document.getElementById('cvOrig');
      cv.width = w; cv.height = h;
      cv.getContext('2d').putImageData(S.imgData, 0, 0);

      // Mirror on overlay canvas
      const cv2 = document.getElementById('cvOver');
      cv2.width = w; cv2.height = h;
      cv2.getContext('2d').putImageData(S.imgData, 0, 0);

      document.getElementById('fstat').textContent = f.name + ' — ' + w + '×' + h;
      document.getElementById('runBtn').disabled = false;
      document.getElementById('pstat').textContent = 'Ready. Click Run Analysis.';
      S.results = null;
      document.getElementById('resPanel').style.display = 'none';
    };
    img.onerror = () => {
      document.getElementById('fstat').textContent = 'Error: could not decode image. Try PNG or JPG.';
    };
    img.src = ev.target.result;
  };
  reader.onerror = () => {
    document.getElementById('fstat').textContent = 'Error: could not read file.';
  };
  reader.readAsDataURL(f);
}

// ─── Core image operations ──────────────────────────────────────────────────
// Grayscale: returns Float32Array in [0,1]
function toGray(imgData) {
  const d = imgData.data;
  const n = imgData.width * imgData.height;
  const out = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    out[i] = (0.299 * d[i*4] + 0.587 * d[i*4+1] + 0.114 * d[i*4+2]) / 255;
  }
  return out;
}

// Simple box blur via separable horizontal+vertical integral-style pass.
// r = half-window radius in pixels. For r=0, returns a copy.
function boxBlur(src, w, h, r) {
  if (r < 1) return src.slice();
  const tmp = new Float32Array(w * h);
  const out = new Float32Array(w * h);
  // Horizontal
  for (let y = 0; y < h; y++) {
    let sum = 0, count = 0;
    for (let x = -r; x <= r; x++) {
      const xi = Math.max(0, Math.min(w - 1, x));
      sum += src[y * w + xi]; count++;
    }
    tmp[y * w + 0] = sum / count;
    for (let x = 1; x < w; x++) {
      const addX = Math.min(w - 1, x + r);
      const remX = Math.max(0, x - r - 1);
      sum += src[y * w + addX] - src[y * w + remX];
      tmp[y * w + x] = sum / count;
    }
  }
  // Vertical
  for (let x = 0; x < w; x++) {
    let sum = 0, count = 0;
    for (let y = -r; y <= r; y++) {
      const yi = Math.max(0, Math.min(h - 1, y));
      sum += tmp[yi * w + x]; count++;
    }
    out[0 * w + x] = sum / count;
    for (let y = 1; y < h; y++) {
      const addY = Math.min(h - 1, y + r);
      const remY = Math.max(0, y - r - 1);
      sum += tmp[addY * w + x] - tmp[remY * w + x];
      out[y * w + x] = sum / count;
    }
  }
  return out;
}

// Background subtraction: gray - blur(gray), then clip to [0,1]
function subtractBG(gray, w, h, blurR) {
  if (blurR < 1) return gray.slice();
  const bg = boxBlur(gray, w, h, blurR);
  const out = new Float32Array(w * h);
  // Normalize to [0, 1] based on max of (gray - bg)
  let mx = 0;
  for (let i = 0; i < gray.length; i++) {
    const v = gray[i] - bg[i];
    out[i] = v;
    if (v > mx) mx = v;
  }
  if (mx > 0) {
    for (let i = 0; i < out.length; i++) {
      out[i] = Math.max(0, out[i] / mx);
    }
  }
  return out;
}

// Binary threshold using PERCENTILE cutoff (robust to bright outliers).
// `thr` = fraction of pixels kept as foreground (0.1 = brightest 10%, 0.5 = top half).
// Slider maps inversely: high slider value → keep only brightest pixels.
function threshold(arr, thr) {
  // Sample-sort approach: sample every 3rd pixel for speed, find percentile
  const sample = [];
  for (let i = 0; i < arr.length; i += 3) sample.push(arr[i]);
  sample.sort((a, b) => a - b);
  // thr=0.5 → keep top 50%, thr=0.9 → keep top 10%
  const cutoffIdx = Math.floor(sample.length * (1 - (1 - thr)));
  // Simpler: just use percentile position directly
  // Slider value = fraction considered "background" below that rank
  const bgFrac = thr; // pixels below this percentile → background
  const cutoff = sample[Math.floor(sample.length * bgFrac)] || 0;
  const out = new Uint8Array(arr.length);
  for (let i = 0; i < arr.length; i++) out[i] = arr[i] > cutoff ? 1 : 0;
  return out;
}

// Connected components (4-connectivity). Returns {labels, sizes, count}
function connectedComponents(bin, w, h) {
  const labels = new Int32Array(w * h);
  const sizes = [0]; // index 0 unused
  let next = 1;
  const stack = [];
  for (let i = 0; i < bin.length; i++) {
    if (!bin[i] || labels[i]) continue;
    const label = next++;
    let count = 0;
    stack.push(i);
    labels[i] = label;
    while (stack.length) {
      const p = stack.pop();
      count++;
      const x = p % w, y = (p / w) | 0;
      // 4-neighbors
      if (x > 0     && bin[p - 1] && !labels[p - 1]) { labels[p - 1] = label; stack.push(p - 1); }
      if (x < w - 1 && bin[p + 1] && !labels[p + 1]) { labels[p + 1] = label; stack.push(p + 1); }
      if (y > 0     && bin[p - w] && !labels[p - w]) { labels[p - w] = label; stack.push(p - w); }
      if (y < h - 1 && bin[p + w] && !labels[p + w]) { labels[p + w] = label; stack.push(p + w); }
    }
    sizes.push(count);
  }
  return { labels, sizes, count: next - 1 };
}

// Simple hole fill: fill components of background (0) that don't touch the image border.
function fillHoles(bin, w, h) {
  // Find background components touching border using BFS on inverted mask.
  const visited = new Uint8Array(w * h);
  const queue = [];
  for (let x = 0; x < w; x++) {
    if (!bin[x])            { queue.push(x);           visited[x] = 1; }
    if (!bin[(h-1)*w + x])  { const p=(h-1)*w+x; queue.push(p); visited[p] = 1; }
  }
  for (let y = 0; y < h; y++) {
    if (!bin[y*w])          { queue.push(y*w);         visited[y*w] = 1; }
    if (!bin[y*w + w - 1])  { const p=y*w+w-1; queue.push(p); visited[p] = 1; }
  }
  let head = 0;
  while (head < queue.length) {
    const p = queue[head++];
    const x = p % w, y = (p / w) | 0;
    if (x > 0     && !bin[p - 1] && !visited[p - 1]) { visited[p - 1] = 1; queue.push(p - 1); }
    if (x < w - 1 && !bin[p + 1] && !visited[p + 1]) { visited[p + 1] = 1; queue.push(p + 1); }
    if (y > 0     && !bin[p - w] && !visited[p - w]) { visited[p - w] = 1; queue.push(p - w); }
    if (y < h - 1 && !bin[p + w] && !visited[p + w]) { visited[p + w] = 1; queue.push(p + w); }
  }
  // Any 0-pixel not visited is an interior hole → fill.
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) {
    out[i] = bin[i] || !visited[i] ? 1 : 0;
  }
  return out;
}

// Extract boundary pixels of a binary mask (pixels with at least one background neighbor).
function boundary(mask, w, h) {
  const out = [];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      if (!mask[i]) continue;
      // 4-neighbor check; image-edge pixels are also boundary.
      if (x === 0 || x === w - 1 || y === 0 || y === h - 1
          || !mask[i - 1] || !mask[i + 1] || !mask[i - w] || !mask[i + w]) {
        out.push([x, y]);
      }
    }
  }
  return out;
}

// ─── Analysis pipeline ──────────────────────────────────────────────────────
function runAnalysis() {
  if (!S.imgData) return;
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  document.getElementById('pstat').textContent = 'Processing...';

  // Yield once so UI updates before heavy work.
  setTimeout(() => {
    const w = S.w, h = S.h;
    const thrVal = +document.getElementById('thr').value;
    const blurR  = +document.getElementById('blur').value | 0;
    const granK  = +document.getElementById('gran').value;

    // 1. Grayscale
    const gray = toGray(S.imgData);

    // 2. Background subtraction + light smoothing
    const bgSub = subtractBG(gray, w, h, blurR);
    const smooth = boxBlur(bgSub, w, h, 1); // very light smooth for stability

    // 3. Threshold
    const binary = threshold(smooth, thrVal);

    // 4. Connected components → pick largest
    const cc = connectedComponents(binary, w, h);
    if (cc.count === 0) {
      document.getElementById('pstat').textContent = 'No cell detected. Adjust threshold.';
      btn.disabled = false;
      return;
    }
    // Identify which components touch the image border — these are likely
    // background/frame and should be deprioritized when picking the cell.
    const touchesBorder = new Uint8Array(cc.sizes.length);
    for (let x = 0; x < w; x++) {
      if (cc.labels[x])           touchesBorder[cc.labels[x]] = 1;
      const bot = (h-1)*w + x;
      if (cc.labels[bot])         touchesBorder[cc.labels[bot]] = 1;
    }
    for (let y = 0; y < h; y++) {
      if (cc.labels[y*w])         touchesBorder[cc.labels[y*w]] = 1;
      const rt = y*w + w - 1;
      if (cc.labels[rt])          touchesBorder[cc.labels[rt]] = 1;
    }
    // Pick: largest NON-border-touching component. If none, fall back.
    let best = 0, bestSize = 0;
    for (let i = 1; i < cc.sizes.length; i++) {
      if (touchesBorder[i]) continue;
      if (cc.sizes[i] > bestSize) { best = i; bestSize = cc.sizes[i]; }
    }
    // Fallback — if no interior component found, use largest overall
    if (!best) {
      for (let i = 1; i < cc.sizes.length; i++) {
        if (cc.sizes[i] > bestSize) { best = i; bestSize = cc.sizes[i]; }
      }
    }
    if (!best) {
      document.getElementById('pstat').textContent = 'No cell detected. Adjust threshold.';
      btn.disabled = false;
      return;
    }
    // Build mask for the selected component only.
    const cellMask = new Uint8Array(w * h);
    for (let i = 0; i < cc.labels.length; i++) {
      if (cc.labels[i] === best) cellMask[i] = 1;
    }
    // Fill interior holes (simple)
    const filled = fillHoles(cellMask, w, h);

    // 5. Measurements
    const edges = boundary(filled, w, h);
    const perimeter = edges.length;
    let area = 0;
    let minX = w, maxX = -1, minY = h, maxY = -1;
    let sumIntensity = 0;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = y * w + x;
        if (!filled[i]) continue;
        area++;
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
        sumIntensity += gray[i];
      }
    }
    const bbW = maxX - minX + 1;
    const bbH = maxY - minY + 1;
    const aspect = Math.max(bbW, bbH) / Math.max(1, Math.min(bbW, bbH));
    const circularity = perimeter > 0
      ? Math.min(1, (4 * Math.PI * area) / (perimeter * perimeter))
      : 0;
    const solidity = (bbW * bbH) > 0 ? area / (bbW * bbH) : 0;
    const meanIntensity = area > 0 ? sumIntensity / area : 0;

    // 6. Verdict
    // TUNABLE: circularity thresholds for interpretation
    let verdict, vClass;
    if (circularity > 0.78)      { verdict = 'Near circular';       vClass = 'v-ok'; }
    else if (circularity > 0.55) { verdict = 'Moderately irregular'; vClass = 'v-mid'; }
    else                         { verdict = 'Clearly irregular';   vClass = 'v-bad'; }

    // 7. Granule detection (optional, simple)
    //    Use gray - heavily-blurred(gray) to isolate bright spots, mask to cell interior.
    const granBG = boxBlur(gray, w, h, 5); // local mean radius for spot relief
    const granules = [];
    // Visited array avoids double-counting
    const visited = new Uint8Array(w * h);
    // Threshold: mean-masked signal + granK * (max - mean)
    let masked_mean = 0, masked_max = 0, masked_n = 0;
    for (let i = 0; i < filled.length; i++) {
      if (!filled[i]) continue;
      const v = gray[i] - granBG[i];
      masked_mean += v; masked_n++;
      if (v > masked_max) masked_max = v;
    }
    masked_mean = masked_n > 0 ? masked_mean / masked_n : 0;
    const granCut = masked_mean + granK * Math.max(0, masked_max - masked_mean);

    // Collect bright spots as small connected components (size-capped)
    // TUNABLE: MAX_GRANULE_PIXELS, MIN_GRANULE_PIXELS
    const MIN_G = 2, MAX_G = 60;
    let totalIntensity = 0;
    let totalArea = 0;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = y * w + x;
        if (!filled[i] || visited[i]) continue;
        const v = gray[i] - granBG[i];
        if (v < granCut) continue;
        // BFS flood, capped
        const stack = [i];
        visited[i] = 1;
        let cnt = 0, sx = 0, sy = 0, sI = 0;
        let abort = false;
        while (stack.length && !abort) {
          const p = stack.pop();
          cnt++;
          const px = p % w, py = (p / w) | 0;
          sx += px; sy += py;
          sI += gray[p];
          if (cnt > MAX_G) { abort = true; break; }
          // 4-neighbors, inside filled mask, above cutoff
          const ns = [p - 1, p + 1, p - w, p + w];
          const valid = [px > 0, px < w - 1, py > 0, py < h - 1];
          for (let k = 0; k < 4; k++) {
            if (!valid[k]) continue;
            const q = ns[k];
            if (visited[q] || !filled[q]) continue;
            if ((gray[q] - granBG[q]) < granCut) continue;
            visited[q] = 1;
            stack.push(q);
          }
        }
        if (!abort && cnt >= MIN_G) {
          granules.push({
            cx: sx / cnt, cy: sy / cnt, area: cnt,
            intensity: sI / cnt
          });
          totalIntensity += sI / cnt;
          totalArea += cnt;
        }
      }
    }

    // 8. Store results
    S.results = {
      width: w, height: h,
      area, perimeter,
      bbox_width: bbW, bbox_height: bbH,
      aspect_ratio: +aspect.toFixed(3),
      circularity: +circularity.toFixed(3),
      solidity: +solidity.toFixed(3),
      mean_intensity: +meanIntensity.toFixed(3),
      verdict,
      granule_count: granules.length,
      granule_mean_area: granules.length > 0 ? +(totalArea / granules.length).toFixed(2) : 0,
      granule_mean_intensity: granules.length > 0 ? +(totalIntensity / granules.length).toFixed(3) : 0,
      _internal: { filled, edges, granules, vClass }
    };

    // 9. Render
    drawOverlay();
    renderResults();
    document.getElementById('expCsv').disabled = false;
    document.getElementById('pstat').textContent = `Done — ${granules.length} granules, ${area}px area`;
    btn.disabled = false;
  }, 20);
}

// ─── Drawing ────────────────────────────────────────────────────────────────
function drawOverlay() {
  if (!S.results) return;
  const cv = document.getElementById('cvOver');
  const ctx = cv.getContext('2d');
  const { filled, edges, granules } = S.results._internal;
  const w = S.w, h = S.h;

  // Base: original image
  ctx.putImageData(S.imgData, 0, 0);

  // Optional: binary mask overlay (semi-transparent)
  if (document.getElementById('showMask').checked) {
    const ov = ctx.createImageData(w, h);
    for (let i = 0; i < filled.length; i++) {
      if (filled[i]) {
        ov.data[i*4]   = 50;
        ov.data[i*4+1] = 255;
        ov.data[i*4+2] = 150;
        ov.data[i*4+3] = 90;
      }
    }
    // Put the mask overlay on top
    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    tmp.getContext('2d').putImageData(ov, 0, 0);
    ctx.drawImage(tmp, 0, 0);
  }

  // Contour
  if (document.getElementById('showContour').checked) {
    ctx.fillStyle = '#00ff99';
    for (const [x, y] of edges) {
      ctx.fillRect(x, y, 1.5, 1.5);
    }
  }

  // Granules
  if (document.getElementById('showGranules').checked) {
    ctx.strokeStyle = '#ffdd33';
    ctx.lineWidth = 1.5;
    for (const g of granules) {
      const r = Math.max(2, Math.sqrt(g.area / Math.PI) + 1);
      ctx.beginPath();
      ctx.arc(g.cx, g.cy, r, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

function renderResults() {
  const r = S.results;
  if (!r) return;
  const rows = [
    ['Area (px)', r.area],
    ['Perimeter (px)', r.perimeter],
    ['Bounding box', `${r.bbox_width} × ${r.bbox_height}`],
    ['Aspect ratio', r.aspect_ratio],
    ['Circularity', r.circularity],
    ['Solidity', r.solidity],
    ['Mean intensity', r.mean_intensity],
    ['Granule count', r.granule_count],
    ['Granule mean area', r.granule_mean_area],
    ['Granule mean intensity', r.granule_mean_intensity]
  ];
  document.getElementById('resBody').innerHTML =
    rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');

  const vEl = document.getElementById('verdict');
  vEl.textContent = r.verdict;
  vEl.className = 'verdict ' + r._internal.vClass;

  document.getElementById('resPanel').style.display = 'block';
}

// ─── CSV export ─────────────────────────────────────────────────────────────
function exportCsv() {
  if (!S.results) return;
  const r = { ...S.results };
  delete r._internal;
  const keys = Object.keys(r);
  const content = keys.join(',') + '\n' +
                  keys.map(k => JSON.stringify(r[k])).join(',');
  const base = S.fileName.replace(/\.[^.]+$/, '') || 'results';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: 'text/csv' }));
  a.download = base + '_results.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}
</script>
